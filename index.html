<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Sky Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter;
  background: #0f1c2e;
  color: white;
  text-align: center;
}

.hidden { display:none; }

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
}

.button {
  display:block;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  background:#1e3a8a;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="container">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="pw" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- HUB -->
<div id="app" class="hidden container">

  <h2>✈️ Safe Sky Hub</h2>

  <a class="button" href="aerofoto.html">✈️ Aerofoto</a>
  <a class="button" href="refuelling.html">⛽ Refuelling</a>
  <a class="button" href="sheets.html">🗂 Admin Panel</a>

  <button onclick="logout()">Logout</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCShhQ3KHWwbJMIB9STLvXiNTOa6UJZDn4",
  authDomain: "safe-sky-app.firebaseapp.com",
  projectId: "safe-sky-app"
});

const auth = firebase.auth();

const OWNER_UID = "L1CAgL8P55gz6oztjj5LIY4saYu2";

function login() {
  auth.signInWithEmailAndPassword(
    email.value, pw.value
  );
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if(!user){
    login.style.display="block";
    app.classList.add("hidden");
    return;
  }

  login.style.display="none";
  app.classList.remove("hidden");
});

</script>

</body>
</html>
