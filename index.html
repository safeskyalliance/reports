<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Sky Alliance</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(to bottom, #0f1c2e, #0a1422);
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.hidden { display: none; }

#login {
    width: 100%;
    max-width: 420px;
    margin-top: 80px;
    text-align: center;
}

#login input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

#login button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

.container {
    width: 100%;
    max-width: 420px;
    text-align: center;
}

.logo {
    font-size: 40px;
    margin-bottom: 10px;
}

.button {
    display: block;
    padding: 16px;
    margin: 10px 0;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    background: #2563eb;
}

.logout {
    background: #ef4444;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    margin-top: 15px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Safe Sky Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pw" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="msg" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app" class="hidden">
    <div class="container">

        <div class="logo">✈️ Safe Sky Alliance</div>

        <a class="button" href="https://docs.google.com/forms/d/e/1FAIpQLScgHExmEVdK-I0OZ8AnA3uJ0ASJPoEe_eNW32ugQ5lpcx-p4Q/viewform">Aerophoto Report</a>
        <a class="button" href="https://forms.gle/LEDoAUUqfPH73GAu5">Equipment Request</a>
        <a class="button" href="https://forms.gle/PDHTD1JdZRuz3St37">Fault Report</a>
        <a class="button" href="https://forms.gle/kWDjHkJuhV6eNNZA9">Leave Request</a>
        <a class="button" href="https://forms.gle/NNwYZCSLVjjhRCBAA">Fuel Report</a>

        <a class="button" href="sheets.html">ADMIN PAGE</a>

        <button class="logout" onclick="logout()">Logout</button>

    </div>
</div>

<!-- FIREBASE (COMPAT VERSION - FIXED) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

// 🔑 FIREBASE CONFIG (TVOJ)
const firebaseConfig = {
  apiKey: "AIzaSyCrwQgz7Evs4gKgQRiR7s1JYLRqdK2WU80",
  authDomain: "safe-sky-alliance.firebaseapp.com",
  projectId: "safe-sky-alliance",
  storageBucket: "safe-sky-alliance.appspot.com",
  messagingSenderId: "256572823166",
  appId: "1:256572823166:web:d09d60574e565eb4c16a2f"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("pw").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(() => {
        showApp();
    })
    .catch(err => {
        document.getElementById("msg").textContent = err.message;
    });
}

// SHOW APP
function showApp() {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").classList.remove("hidden");
}

// LOGOUT
function logout() {
    auth.signOut().then(() => {
        document.getElementById("login").style.display = "block";
        document.getElementById("app").classList.add("hidden");
    });
}

// AUTO LOGIN
auth.onAuthStateChanged(user => {
    if (user) {
        showApp();
    } else {
        document.getElementById("login").style.display = "block";
        document.getElementById("app").classList.add("hidden");
    }
});

</script>

</body>
</html>
