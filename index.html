<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Sky Alliance</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: Inter, sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
}

/* LOGIN */
#login {
    max-width:400px;
    margin:80px auto;
    text-align:center;
}

/* MAIN WRAPPER */
.box {
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* GRID CELLS */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap:15px;
    margin-top:15px;
}

/* CARD / CELLS */
.card {
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    border:1px solid #334155;
}

/* INPUTS */
input, textarea, select {
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
    background:#0b1220;
    color:white;
}

/* BUTTONS */
button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover {
    opacity:0.9;
}

/* ADMIN */
.admin {
    border:1px solid #f97316;
}

/* LOGOUT */
.logout {
    background:#ef4444;
}

/* HIDE */
.hidden { display:none; }

h2 {
    text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="pw" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg" style="color:red"></p>
</div>

<!-- APP -->
<div id="app" class="box hidden">

    <h2>✈️ Safe Sky Alliance</h2>

    <div id="adminPanel" class="card admin hidden">
        <h3>🛠 ADMIN PANEL</h3>
        <button onclick="loadReports()">📥 Load Reports</button>
        <div id="reports" class="grid"></div>
    </div>

    <div class="grid">

        <div class="card">
            <h3>📨 Submit Report</h3>

            <select id="type">
                <option>✈️ Aerophoto</option>
                <option>🧰 Equipment</option>
                <option>⚠️ Fault</option>
                <option>🛫 Leave</option>
                <option>⛽ Fuel</option>
            </select>

            <textarea id="message" placeholder="✍️ Opis..."></textarea>

            <button onclick="sendReport()">🚀 Send</button>
        </div>

    </div>

    <button class="logout" onclick="logout()">🚪 Logout</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCShhQ3KHWwbJMIB9STLvXiNTOa6UJZDn4",
  authDomain: "safe-sky-app.firebaseapp.com",
  projectId: "safe-sky-app",
  storageBucket: "safe-sky-app.appspot.com",
  messagingSenderId: "1083962320171",
  appId: "1:1083962320171:web:b46354013124872e31116e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let isAdmin = false;

function login() {
    auth.signInWithEmailAndPassword(
        document.getElementById("email").value,
        document.getElementById("pw").value
    )
    .catch(e => document.getElementById("msg").innerText = e.message);
}

function logout() {
    auth.signOut();
}

auth.onAuthStateChanged(async user => {
    if (!user) {
        document.getElementById("login").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
        return;
    }

    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    const doc = await db.collection("users").doc(user.uid).get();

    isAdmin = doc.exists && doc.data().role === "admin";

    if (isAdmin) {
        document.getElementById("adminPanel").classList.remove("hidden");
    }
});

function sendReport() {
    const user = auth.currentUser;

    db.collection("reports").add({
        type: document.getElementById("type").value,
        message: document.getElementById("message").value,
        user: user.email,
        time: Date.now()
    });

    alert("Sent!");
}

function loadReports() {
    db.collection("reports")
    .orderBy("time","desc")
    .get()
    .then(snap => {
        let html = "";
        snap.forEach(doc => {
            const d = doc.data();
            html += `<div class="card">
                <b>${d.type}</b><br>
                ${d.message}<br>
                <small>${d.user}</small>
            </div>`;
        });
        document.getElementById("reports").innerHTML = html;
    });
}

</script>

</body>
</html>
