<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Sky Alliance</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: Inter;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.hidden { display:none; }

.box {
    width: 100%;
    max-width: 420px;
    text-align:center;
}

input, textarea {
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:8px;
    border:none;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.card {
    background:#1e293b;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
}

.admin { background:#f97316; }
.logout { background:#ef4444; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="box">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="pw" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg" style="color:red"></p>
</div>

<!-- APP -->
<div id="app" class="box hidden">

    <h2>Safe Sky Alliance</h2>

    <div id="adminPanel" class="card admin hidden">
        <h3>ADMIN PANEL</h3>
        <button onclick="loadReports()">Load Reports</button>
        <div id="reports"></div>
    </div>

    <div class="card">
        <h3>Submit Report</h3>

        <select id="type">
            <option>Aerophoto</option>
            <option>Equipment</option>
            <option>Fault</option>
            <option>Leave</option>
            <option>Fuel</option>
        </select>

        <textarea id="message" placeholder="Opis..."></textarea>

        <button onclick="sendReport()">Send</button>
    </div>

    <button class="logout" onclick="logout()">Logout</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCShhQ3KHWwbJMIB9STLvXiNTOa6UJZDn4",
  authDomain: "safe-sky-app.firebaseapp.com",
  projectId: "safe-sky-app",
  storageBucket: "safe-sky-app.appspot.com",
  messagingSenderId: "1083962320171",
  appId: "1:1083962320171:web:b46354013124872e31116e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let isAdmin = false;

/* LOGIN */
function login() {
    auth.signInWithEmailAndPassword(
        document.getElementById("email").value,
        document.getElementById("pw").value
    )
    .catch(e => document.getElementById("msg").innerText = e.message);
}

/* LOGOUT */
function logout() {
    auth.signOut();
}

/* CHECK USER */
auth.onAuthStateChanged(async user => {
    if (!user) {
        document.getElementById("login").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
        return;
    }

    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    // check role
    const doc = await db.collection("users").doc(user.uid).get();

    isAdmin = doc.exists && doc.data().role === "admin";

    if (isAdmin) {
        document.getElementById("adminPanel").classList.remove("hidden");
    }
});

/* SEND REPORT */
function sendReport() {
    const user = auth.currentUser;

    db.collection("reports").add({
        type: document.getElementById("type").value,
        message: document.getElementById("message").value,
        user: user.email,
        time: Date.now()
    });

    alert("Sent!");
}

/* LOAD REPORTS (ADMIN) */
function loadReports() {
    db.collection("reports")
    .orderBy("time","desc")
    .get()
    .then(snap => {
        let html = "";
        snap.forEach(doc => {
            const d = doc.data();
            html += `<div class="card">
                <b>${d.type}</b><br>
                ${d.message}<br>
                <small>${d.user}</small>
            </div>`;
        });
        document.getElementById("reports").innerHTML = html;
    });
}

</script>

</body>
</html>
