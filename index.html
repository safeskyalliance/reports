<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Sky Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background: #0f1c2e;
  color: white;
  text-align: center;
  margin: 0;
}

.hidden { display:none; }

.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: #2563eb;
  color: white;
}

.button {
  display:block;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  background:#1e3a8a;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="container">
  <h2>Login</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="pw" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- HUB -->
<div id="app" class="hidden container">

  <h2>✈️ Safe Sky Hub</h2>

  <!-- FORMS -->
  <a class="button" target="_blank"
     href="https://docs.google.com/forms/d/e/1FAIpQLScgHExmEVdK-I0OZ8AnA3uJ0ASJPoEe_eNW32ugQ5lpcx-p4Q/viewform">
     ✈️ Aerophoto Report
  </a>

  <a class="button" target="_blank"
     href="https://forms.gle/LEDoAUUqfPH73GAu5">
     🛠 Equipment Request
  </a>

  <a class="button" target="_blank"
     href="https://forms.gle/PDHTD1JdZRuz3St37">
     ⚠️ Fault Report
  </a>

  <a class="button" target="_blank"
     href="https://forms.gle/kWDjHkJuhV6eNNZA9">
     📝 Leave Request
  </a>

  <a class="button" target="_blank"
     href="https://forms.gle/NNwYZCSLVjjhRCBAA">
     ⛽ Fuel Report
  </a>

  <!-- DASHBOARDS -->
  <a class="button" href="aerofoto.html">✈️ Aerofoto Dashboard</a>
  <a class="button" href="refuelling.html">⛽ Refuelling Dashboard</a>

  <!-- ADMIN -->
  <a class="button" href="sheets.html">🗂 Admin Panel</a>

  <button onclick="logout()">Logout</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCShhQ3KHWwbJMIB9STLvXiNTOa6UJZDn4",
  authDomain: "safe-sky-app.firebaseapp.com",
  projectId: "safe-sky-app"
});

const auth = firebase.auth();

const loginBox = document.getElementById("login");
const appBox = document.getElementById("app");

window.login = function() {

  const email = document.getElementById("email").value;
  const pw = document.getElementById("pw").value;

  auth.signInWithEmailAndPassword(email, pw)
    .catch(err => alert(err.message));
};

window.logout = function() {
  auth.signOut();
};

auth.onAuthStateChanged(user => {

  if(!user){
    loginBox.style.display = "block";
    appBox.classList.add("hidden");
    return;
  }

  loginBox.style.display = "none";
  appBox.classList.remove("hidden");
});

</script>

</body>
</html>
