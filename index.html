<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Sky Alliance Forms</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(to bottom, #0f1c2e, #0a1422);
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.hidden { display: none; }

#password-screen {
    width: 100%;
    max-width: 420px;
    margin: 50px auto;
    text-align: center;
}

#password-screen input {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin: 8px 0;
}

#password-screen button {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

.container {
    width: 100%;
    max-width: 420px;
    text-align: center;
}

.logo-circle {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #1e3a8a;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 15px auto;
    font-size: 40px;
}

h1 { font-size: 26px; font-weight: 700; }

.subtitle {
    margin: 8px 0 30px;
    color: #9ca3af;
    font-size: 14px;
}

.button {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    padding: 18px;
    margin-bottom: 15px;
    border-radius: 14px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    width: 100%;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

.blue { background: linear-gradient(135deg, #2563eb, #1e40af); }
.orange { background: linear-gradient(135deg, #f97316, #c2410c); }
.green { background: linear-gradient(135deg, #22c55e, #15803d); }
.yellow { background: linear-gradient(135deg, #e0c060, #c9b04f); }

.footer {
    margin-top: 40px;
    font-size: 12px;
    color: #6b7280;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="password-screen">
    <h2>Safe Sky Alliance Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pw" placeholder="Password">

    <button onclick="login()">Prijava</button>

    <p id="msg" style="color:red;"></p>
</div>

<!-- APP -->
<div id="content" class="hidden">
    <div class="container">

        <div class="logo-circle">✈️</div>

        <h1>Safe Sky Alliance</h1>
        <div class="subtitle">Forms Dashboard</div>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLScgHExmEVdK-I0OZ8AnA3uJ0ASJPoEe_eNW32ugQ5lpcx-p4Q/viewform" class="button blue">
            ✈️ Aerophoto Report
        </a>

        <a href="https://forms.gle/LEDoAUUqfPH73GAu5" class="button blue">
            🛠 Equipment Request
        </a>

        <a href="https://forms.gle/PDHTD1JdZRuz3St37" class="button orange">
            ⚠️ Fault Report
        </a>

        <a href="https://forms.gle/kWDjHkJuhV6eNNZA9" class="button green">
            📝 Leave Request
        </a>

        <a href="https://forms.gle/NNwYZCSLVjjhRCBAA" class="button yellow">
            ⛽ Vehicle Refuelling Report
        </a>

        <a href="sheets.html" class="button blue">🗂 ADMIN Page</a>

        <button class="button orange" onclick="logout()">🚪 Logout</button>

        <div class="footer">
            © 2026 Safe Sky Alliance
        </div>

    </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("pw").value;

    document.getElementById("msg").textContent = "";

    auth.signInWithEmailAndPassword(email, password)
        .then(() => {
            showApp();
        })
        .catch(err => {
            document.getElementById("msg").textContent = err.message;
        });
}

// SHOW APP
function showApp() {
    document.getElementById('password-screen').style.display = 'none';
    document.getElementById('content').classList.remove('hidden');
}

// LOGOUT
function logout() {
    auth.signOut().then(() => {
        document.getElementById('password-screen').style.display = 'block';
        document.getElementById('content').classList.add('hidden');
        document.getElementById("email").value = "";
        document.getElementById("pw").value = "";
    });
}

// AUTO LOGIN
auth.onAuthStateChanged(user => {
    if (user) {
        showApp();
    } else {
        document.getElementById('password-screen').style.display = 'block';
        document.getElementById('content').classList.add('hidden');
    }
});
</script>

</body>
</html>
