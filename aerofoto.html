<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aerofoto Flight Log</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background: #0f1c2e;
  color: white;
  margin: 0;
  padding: 20px;
}

/* LOCK SCREEN */
#lockScreen {
  position: fixed;
  inset: 0;
  background: #0f1c2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 9999;
}

/* CONTENT */
.hidden {
  display: none;
}

.container {
  max-width: 1400px;
  margin: auto;
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  font-size: 12px;
}

th, td {
  border: 1px solid #444;
  padding: 6px;
  text-align: center;
}

th {
  background: #1e2a45;
}

input, button {
  padding: 6px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔒 LOCK -->
<div id="lockScreen">
  Checking access...
</div>

<!-- APP -->
<div id="app" class="hidden container">

<h1>✈️ Aerofoto Flight Log</h1>

<div>
  <input type="text" id="aircraft-filter" placeholder="Aircraft">
  <input type="text" id="pilot-filter" placeholder="Pilot">
  <input type="text" id="company-filter" placeholder="Company">
  <button onclick="applyFilter()">Filter</button>
</div>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Aircraft</th>
      <th>PIC</th>
      <th>Copilot</th>
      <th>Tech</th>
      <th>Dep ICAO</th>
      <th>Arr ICAO</th>
      <th>Duration</th>
      <th>Mission</th>
      <th>Company</th>
      <th>Fuel</th>
      <th>Oil</th>
      <th>Notes</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- PAPAPARSE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCShhQ3KHWwbJMIB9STLvXiNTOa6UJZDn4",
  authDomain: "safe-sky-app.firebaseapp.com",
  projectId: "safe-sky-app"
});

const auth = firebase.auth();

const OWNER_UID = "L1CAgL8P55gz6oztjj5LIY4saYu2";

const lock = document.getElementById("lockScreen");
const app = document.getElementById("app");

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ63_O7Bwpf9uCQy1UzwjZkotEuJTEFK0rqKSfXUbN_b9ImPM2hGGN3CqfMDZkdjmpMrrgG-z2XfW70/pub?output=csv";

let dataStore = [];

/* 🔐 SECURITY GUARD */
auth.onAuthStateChanged(user => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  if (user.uid !== OWNER_UID) {
    document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:60px'>Access Denied</h2>";
    return;
  }

  lock.style.display = "none";
  app.classList.remove("hidden");

});

/* LOAD DATA */
Papa.parse(sheetURL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    dataStore = results.data.filter(r => r["Date of Flight"]);
    render(dataStore);
  }
});

function safe(v) {
  return v || "";
}

function render(data) {

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach(row => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${safe(row["Date of Flight"])}</td>
      <td>${safe(row["Aircraft Registration"])}</td>
      <td>${safe(row["Pilot in Command (Name code)"])}</td>
      <td>${safe(row["Copilot (Name code)"])}</td>
      <td>${safe(row["Survey Observer/Technician (Name)"])}</td>
      <td>${safe(row["Departure Airport (ICAO)"])}</td>
      <td>${safe(row["Arrival Airport (ICAO)"])}</td>
      <td>${safe(row["Total Flight Duration"])}</td>
      <td>${safe(row["Survey Area/Project Name"])}</td>
      <td>${safe(row["Company Name"])}</td>
      <td>${safe(row["FUEL Uplift before flight"])}</td>
      <td>${safe(row["OIL Uplift before flight"])}</td>
      <td>${safe(row["Comments and Notes (flight or maintenance notes)"])}</td>
    `;

    tbody.appendChild(tr);
  });
}

function applyFilter() {

  const aircraft = document.getElementById("aircraft-filter").value.toLowerCase();
  const pilot = document.getElementById("pilot-filter").value.toLowerCase();
  const company = document.getElementById("company-filter").value.toLowerCase();

  const filtered = dataStore.filter(row => {

    let ok = true;

    if (aircraft)
      ok = row["Aircraft Registration"]?.toLowerCase().includes(aircraft);

    if (pilot)
      ok = ok && (
        row["Pilot in Command (Name code)"]?.toLowerCase().includes(pilot) ||
        row["Copilot (Name code)"]?.toLowerCase().includes(pilot)
      );

    if (company)
      ok = ok && row["Company Name"]?.toLowerCase().includes(company);

    return ok;
  });

  render(filtered);
}

</script>

</body>
</html>
