<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background: #0f1c2e;
  color: white;
  margin: 0;
  padding: 0;
}

/* LOCK SCREEN */
#lockScreen {
  position: fixed;
  inset: 0;
  background: #0f1c2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 9999;
}

/* CONTENT */
.hidden {
  display: none;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

.button {
  display: block;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  text-decoration: none;
  font-weight: 600;
  cursor: pointer;
}

.button:active {
  transform: scale(0.98);
}

.section {
  margin-top: 30px;
  opacity: 0.9;
  font-size: 14px;
}

/* MODAL FIX */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
  z-index: 9999;

  display: none; /* 🔥 KLJUČ */
}

.modal.show {
  display: flex;
}

.modal-content {
  background: #0f1c2e;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 420px;
}

.input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  box-sizing: border-box;
}
</style>
</head>

<body>

<!-- 🔒 LOCK -->
<div id="lockScreen">
  Checking access...
</div>

<!-- ADMIN CONTENT -->
<div id="content" class="hidden container">

  <h1>🗂 Admin Panel</h1>

  <div class="section">📊 LIVE SYSTEMS</div>

  <a class="button" href="aerofoto.html">✈️ Aerofoto Live Report</a>
  <a class="button" href="refuelling.html">⛽ Refuelling Live Report</a>

  <div class="section">⛽ FUEL MANAGEMENT</div>

  <div class="button" onclick="openFuelForm()">
    ➕ Fuel Admin Entry
  </div>

</div>

<!-- 🔥 MODAL -->
<div id="fuelModal" class="modal">

  <div class="modal-content">

    <h2>⛽ Fuel Admin Entry</h2>

    <input id="fuelDate" type="date" class="input">

    <!-- DROPDOWN -->
    <select id="fuelCompany" class="input">
      <option value="">Select Company</option>
      <option value="Topgeo">Topgeo</option>
      <option value="Ekosan">Ekosan</option>
      <option value="Ciklonizacija">Ciklonizacija</option>
    </select>

    <input id="fuelQuantity" type="number" placeholder="Quantity (L)" class="input">
    <input id="fuelPerson" type="text" placeholder="Responsible Person" class="input">

    <div class="button" onclick="submitFuel()">Submit</div>
    <div class="button" style="background:#64748b" onclick="closeFuelForm()">Close</div>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCShhQ3KHWwbJMIB9STLvXiNTOa6UJZDn4",
  authDomain: "safe-sky-app.firebaseapp.com",
  projectId: "safe-sky-app"
});

const auth = firebase.auth();

const OWNER_UID = "L1CAgL8P55gz6oztjj5LIY4saYu2";

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4tk_GQrs_KFABInbpKjekVAeVYUlcdHmXYUjJbSNqObYcDWJVFk23s4E6SuQt7Pfk1Q/exec";

/* AUTH */
auth.onAuthStateChanged(user => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  if (user.uid !== OWNER_UID) {
    document.body.innerHTML = `<h2 style="color:white;text-align:center;margin-top:60px;">⛔ Access Denied</h2>`;
    return;
  }

  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("content").classList.remove("hidden");

});

/* MODAL FIX */
function openFuelForm() {
  document.getElementById("fuelModal").classList.add("show");
}

function closeFuelForm() {
  document.getElementById("fuelModal").classList.remove("show");
}

/* CLICK OUTSIDE TO CLOSE */
document.getElementById("fuelModal").addEventListener("click", function(e) {
  if (e.target === this) {
    closeFuelForm();
  }
});

/* SUBMIT */
async function submitFuel() {

  const payload = {
    date: document.getElementById("fuelDate").value,
    company: document.getElementById("fuelCompany").value,
    quantity: document.getElementById("fuelQuantity").value,
    person: document.getElementById("fuelPerson").value
  };

  if (!payload.date || !payload.company || !payload.quantity || !payload.person) {
    alert("Fill all fields!");
    return;
  }

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  alert("Fuel saved!");

  closeFuelForm();

  document.getElementById("fuelDate").value = "";
  document.getElementById("fuelCompany").value = "";
  document.getElementById("fuelQuantity").value = "";
  document.getElementById("fuelPerson").value = "";
}

</script>

</body>
</html>
