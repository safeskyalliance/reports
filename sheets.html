<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f1c2e;
  color: white;
  margin: 0;
  padding: 0;
}

.hidden { display: none; }

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

.button {
  display: block;
  padding: 14px;
  margin: 10px 0;
  background: #2563eb;
  border-radius: 10px;
  cursor: pointer;
}

.section {
  margin-top: 20px;
  font-size: 14px;
  opacity: 0.8;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal.show {
  display: flex;
}

.modal-box {
  background: #111c2e;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 420px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lockScreen">Checking access...</div>

<!-- CONTENT -->
<div id="app" class="hidden container">

  <h1>🗂 Admin Panel</h1>

  <div class="section">⛽ Fuel Management</div>

  <div class="button" onclick="openFuel()">
    ➕ Fuel Admin Entry
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">

  <div class="modal-box">

    <h3>Fuel Entry</h3>

    <input id="date" type="date">

    <select id="company">
      <option value="">Select Company</option>
      <option value="Topgeo">Topgeo</option>
      <option value="Ekosan">Ekosan</option>
      <option value="Ciklonizacija">Ciklonizacija</option>
    </select>

    <input id="qty" type="number" placeholder="Quantity">
    <input id="person" type="text" placeholder="Responsible Person">

    <button onclick="submitFuel()">Submit</button>
    <button onclick="closeFuel()">Close</button>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCShhQ3KHWwbJMIB9STLvXiNTOa6UJZDn4",
  authDomain: "safe-sky-app.firebaseapp.com",
  projectId: "safe-sky-app"
});

const auth = firebase.auth();
const OWNER_UID = "L1CAgL8P55gz6oztjj5LIY4saYu2";

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4tk_GQrs_KFABInbpKjekVAeVYUlcdHmXYUjJbSNqObYcDWJVFk23s4E6SuQt7Pfk1Q/exec";

/* AUTH */
auth.onAuthStateChanged(user => {

  if (!user || user.uid !== OWNER_UID) {
    window.location.href = "index.html";
    return;
  }

  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("app").classList.remove("hidden");

});

/* MODAL */
function openFuel() {
  document.getElementById("modal").classList.add("show");
}

function closeFuel() {
  document.getElementById("modal").classList.remove("show");
}

/* CLOSE BACKDROP */
document.getElementById("modal").addEventListener("click", e => {
  if (e.target.id === "modal") closeFuel();
});

/* SUBMIT */
async function submitFuel() {

  const payload = {
    date: document.getElementById("date").value,
    company: document.getElementById("company").value,
    quantity: document.getElementById("qty").value,
    person: document.getElementById("person").value
  };

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  alert("Saved!");
  closeFuel();
}

</script>

</body>
</html>
