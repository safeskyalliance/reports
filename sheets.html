<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  font-family: Inter, Arial, sans-serif;
  background: #0f1c2e;
  color: white;
  margin: 0;
}

/* LOCK */
#lockScreen {
  position: fixed;
  inset: 0;
  background: #0f1c2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

/* LAYOUT */
.hidden { display: none; }

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

.section {
  margin-top: 25px;
  font-size: 13px;
  opacity: 0.7;
}

/* BUTTONS */
.button {
  display: block;
  padding: 14px;
  margin: 10px 0;
  background: linear-gradient(135deg, #2563eb, #1e40af);
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  text-decoration: none;
  color: white;
}

/* SPECIAL BUTTON */
.button.green {
  background: linear-gradient(135deg, #22c55e, #15803d);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal.show {
  display: flex;
}

/* CARD LOOK (IMPORTANT FIX) */
.modal-box {
  background: #111c2e;
  padding: 25px;
  border-radius: 18px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  text-align: center;
}

.modal-box h2 {
  margin-bottom: 15px;
}

/* INPUTS LOOK GOOD */
.input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #0f1c2e;
  color: white;
  outline: none;
}

.input:focus {
  border-color: #2563eb;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-weight: 600;
  cursor: pointer;
}

.btn.primary {
  background: #2563eb;
  color: white;
}

.btn.secondary {
  background: #334155;
  color: white;
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lockScreen">Checking access...</div>

<!-- APP -->
<div id="app" class="hidden container">

  <h1>🗂 Admin Panel</h1>

  <!-- SYSTEMS -->
  <div class="section">📊 LIVE SYSTEMS</div>

  <a class="button" href="aerofoto.html">
    ✈️ Aerofoto Live Report
  </a>

  <a class="button" href="refuelling.html">
    ⛽ Refuelling Live Report
  </a>

  <!-- FUEL -->
  <div class="section">⛽ FUEL MANAGEMENT</div>

  <div class="button green" onclick="openFuel()">
    ➕ Fuel Admin Entry
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">

  <div class="modal-box">

    <h2>⛽ Fuel Entry</h2>

    <input id="date" type="date" class="input">

    <select id="company" class="input">
      <option value="">Select Company</option>
      <option value="Topgeo">Topgeo</option>
      <option value="Ekosan">Ekosan</option>
      <option value="Ciklonizacija">Ciklonizacija</option>
    </select>

    <input id="qty" type="number" placeholder="Quantity (L)" class="input">
    <input id="person" type="text" placeholder="Responsible Person" class="input">

    <button class="btn primary" onclick="submitFuel()">Submit</button>
    <button class="btn secondary" onclick="closeFuel()">Close</button>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCShhQ3KHWwbJMIB9STLvXiNTOa6UJZDn4",
  authDomain: "safe-sky-app.firebaseapp.com",
  projectId: "safe-sky-app"
});

const auth = firebase.auth();
const OWNER_UID = "L1CAgL8P55gz6oztjj5LIY4saYu2";

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4tk_GQrs_KFABInbpKjekVAeVYUlcdHmXYUjJbSNqObYcDWJVFk23s4E6SuQt7Pfk1Q/exec";

/* AUTH */
auth.onAuthStateChanged(user => {

  if (!user || user.uid !== OWNER_UID) {
    window.location.href = "index.html";
    return;
  }

  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("app").classList.remove("hidden");

});

/* OPEN / CLOSE */
function openFuel() {
  document.getElementById("modal").classList.add("show");
}

function closeFuel() {
  document.getElementById("modal").classList.remove("show");
}

/* BACKDROP CLOSE */
document.getElementById("modal").addEventListener("click", e => {
  if (e.target.id === "modal") closeFuel();
});

/* SUBMIT */
async function submitFuel() {

  const payload = {
    date: document.getElementById("date").value,
    company: document.getElementById("company").value,
    quantity: document.getElementById("qty").value,
    person: document.getElementById("person").value
  };

  if (!payload.date || !payload.company || !payload.quantity || !payload.person) {
    alert("Fill all fields!");
    return;
  }

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  alert("Saved!");

  closeFuel();

  document.getElementById("date").value = "";
  document.getElementById("company").value = "";
  document.getElementById("qty").value = "";
  document.getElementById("person").value = "";
}

</script>

</body>
</html>
