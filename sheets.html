<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background: #0f1c2e;
  color: white;
  margin: 0;
}

/* LOCK */
#lockScreen {
  position: fixed;
  inset: 0;
  background: #0f1c2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

/* LAYOUT */
.hidden { display: none !important; }

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

.section {
  margin-top: 25px;
  opacity: 0.8;
  font-size: 14px;
}

/* BUTTON */
.button {
  display: block;
  padding: 14px;
  margin: 10px 0;
  background: #2563eb;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
}

/* GREEN BUTTON */
.green {
  background: linear-gradient(135deg,#22c55e,#15803d);
}

/* MODAL (FIXED VERSION — NO BUGS) */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal.show {
  display: flex;
}

.modal-box {
  background: #111c2e;
  padding: 22px;
  border-radius: 16px;
  width: 90%;
  max-width: 420px;
}

.input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #0f1c2e;
  color: white;
}

/* ACTION BUTTONS */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

.primary { background: #2563eb; color: white; }
.secondary { background: #334155; color: white; }
</style>
</head>

<body>

<!-- LOCK -->
<div id="lockScreen">Checking access...</div>

<!-- APP -->
<div id="content" class="hidden container">

  <h1>🗂 Admin Panel</h1>

  <div class="section">📊 LIVE SYSTEMS</div>

  <div class="button" onclick="window.location.href='aerofoto.html'">
    ✈️ Aerofoto Live Report
  </div>

  <div class="button" onclick="window.location.href='refuelling.html'">
    ⛽ Refuelling Live Report
  </div>

  <div class="section">⛽ FUEL MANAGEMENT</div>

  <div class="button green" onclick="openFuel()">
    ➕ Fuel Admin Entry
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">

  <div class="modal-box">

    <h2>⛽ Fuel Entry</h2>

    <input id="date" type="date" class="input">

    <select id="company" class="input">
      <option value="">Select Company</option>
      <option value="Topgeo">Topgeo</option>
      <option value="Ekosan">Ekosan</option>
      <option value="Ciklonizacija">Ciklonizacija</option>
    </select>

    <input id="qty" type="number" placeholder="Quantity (L)" class="input">
    <input id="person" type="text" placeholder="Responsible Person" class="input">

    <button class="btn primary" onclick="submitFuel()">Submit</button>
    <button class="btn secondary" onclick="closeFuel()">Close</button>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCShhQ3KHWwbJMIB9STLvXiNTOa6UJZDn4",
  authDomain: "safe-sky-app.firebaseapp.com",
  projectId: "safe-sky-app"
});

const auth = firebase.auth();
const OWNER_UID = "L1CAgL8P55gz6oztjj5LIY4saYu2";

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw4tk_GQrs_KFABInbpKjekVAeVYUlcdHmXYUjJbSNqObYcDWJVFk23s4E6SuQt7Pfk1Q/exec";

/* AUTH */
auth.onAuthStateChanged(user => {

  if (!user || user.uid !== OWNER_UID) {
    window.location.href = "index.html";
    return;
  }

  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("content").classList.remove("hidden");

});

/* MODAL */
function openFuel() {
  document.getElementById("modal").classList.add("show");
}

function closeFuel() {
  document.getElementById("modal").classList.remove("show");
}

/* CLICK OUTSIDE */
document.getElementById("modal").addEventListener("click", e => {
  if (e.target.id === "modal") closeFuel();
});

/* SUBMIT */
async function submitFuel() {

  const payload = {
    date: date.value,
    company: company.value,
    quantity: qty.value,
    person: person.value
  };

  if (!payload.date || !payload.company || !payload.quantity || !payload.person) {
    alert("Fill all fields");
    return;
  }

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  alert("Saved!");

  closeFuel();

  date.value = "";
  company.value = "";
  qty.value = "";
  person.value = "";
}

</script>

</body>
</html>
