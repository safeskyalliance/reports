<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background: #0f1c2e;
  color: white;
  margin: 0;
}

/* LOCK */
#lockScreen {
  position: fixed;
  inset: 0;
  background: #0f1c2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

/* APP */
.hidden { display: none !important; }

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

.section {
  margin-top: 25px;
  font-size: 14px;
  opacity: 0.75;
}

/* BUTTONS */
.button {
  display: block;
  padding: 14px;
  margin: 10px 0;
  background: #2563eb;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
}

.green {
  background: linear-gradient(135deg,#22c55e,#15803d);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal.show {
  display: flex;
}

/* CARD */
.modal-box {
  background: #0f1c2e;
  padding: 28px;
  border-radius: 18px;
  width: 92%;
  max-width: 440px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.55);
  text-align: left;
}

/* INPUTS */
.input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: #0b1626;
  color: white;
}

.input:focus {
  border-color: #2563eb;
  outline: none;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-top: 12px;
  cursor: pointer;
  font-weight: 600;
  font-size: 15px;
}

.primary {
  background: linear-gradient(135deg, #2563eb, #1e40af);
  color: white;
}

.secondary {
  background: #334155;
  color: white;
}

/* DISABLED STATE */
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lockScreen">Checking access...</div>

<!-- APP -->
<div id="content" class="hidden container">

  <h1>🗂 Admin Panel</h1>

  <div class="section">📊 LIVE SYSTEMS</div>

  <div class="button" onclick="window.location.href='aerofoto.html'">
    ✈️ Aerofoto Live Report
  </div>

  <div class="button" onclick="window.location.href='refuelling.html'">
    ⛽ Refuelling Live Report
  </div>

  <div class="section">⛽ FUEL MANAGEMENT</div>

  <div class="button green" onclick="openFuel()">
    ➕ Fuel Admin Entry
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">

  <div class="modal-box">

    <h2>⛽ Fuel Entry</h2>

    <input id="date" type="date" class="input">

    <select id="company" class="input">
      <option value="">Select Company</option>
      <option value="Topgeo">Topgeo</option>
      <option value="Ekosan">Ekosan</option>
      <option value="Ciklonizacija">Ciklonizacija</option>
    </select>

    <input id="qty" type="number" placeholder="Quantity (L)" class="input">
    <input id="person" type="text" placeholder="Responsible Person" class="input">

    <button class="btn primary" onclick="submitFuel()" id="submitBtn">
      Submit
    </button>

    <button class="btn secondary" onclick="closeFuel()">
      Close
    </button>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCShhQ3KHWwbJMIB9STLvXiNTOa6UJZDn4",
  authDomain: "safe-sky-app.firebaseapp.com",
  projectId: "safe-sky-app"
});

const auth = firebase.auth();
const OWNER_UID = "L1CAgL8P55gz6oztjj5LIY4saYu2";

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw4tk_GQrs_KFABInbpKjekVAeVYUlcdHmXYUjJbSNqObYcDWJVFk23s4E6SuQt7Pfk1Q/exec";

/* AUTH */
auth.onAuthStateChanged(user => {

  if (!user || user.uid !== OWNER_UID) {
    window.location.href = "index.html";
    return;
  }

  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("content").classList.remove("hidden");

});

/* MODAL */
function openFuel() {
  document.getElementById("modal").classList.add("show");
}

function closeFuel() {
  document.getElementById("modal").classList.remove("show");
}

/* CLICK OUTSIDE */
document.getElementById("modal").addEventListener("click", e => {
  if (e.target.id === "modal") closeFuel();
});

/* SUBMIT (ANTI DOUBLE CLICK FIX) */
async function submitFuel() {

  const btn = document.getElementById("submitBtn");

  // lock button
  btn.disabled = true;
  btn.innerText = "Saving...";

  try {

    const payload = {
      date: date.value,
      company: company.value,
      quantity: qty.value,
      person: person.value
    };

    if (!payload.date || !payload.company || !payload.quantity || !payload.person) {
      alert("Fill all fields!");
      btn.disabled = false;
      btn.innerText = "Submit";
      return;
    }

    await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    closeFuel();

    date.value = "";
    company.value = "";
    qty.value = "";
    person.value = "";

  } catch (err) {
    alert("Error sending data");
  }

  // unlock button
  btn.disabled = false;
  btn.innerText = "Submit";
}

</script>

</body>
</html>
