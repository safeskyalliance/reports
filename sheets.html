<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background: #0f1c2e;
  color: white;
  margin: 0;
  padding: 0;
}

/* LOCK SCREEN */
#lockScreen {
  position: fixed;
  inset: 0;
  background: #0f1c2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 9999;
}

/* CONTENT */
.hidden {
  display: none;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

.button {
  display: block;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  text-decoration: none;
  font-weight: 600;
  transition: 0.2s ease;
}

.button:active {
  transform: scale(0.98);
}

.section {
  margin-top: 30px;
  opacity: 0.9;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- 🔒 LOCK -->
<div id="lockScreen">
  Checking access...
</div>

<!-- ADMIN CONTENT -->
<div id="content" class="hidden container">

  <h1>🗂 Admin Panel</h1>

  <div class="section">📊 LIVE SYSTEMS</div>

  <a class="button" href="aerofoto.html">
    ✈️ Aerofoto Live Report
  </a>

  <a class="button" href="refuelling.html">
    ⛽ Refuelling Live Report
  </a>

  <div class="section">📁 GOOGLE SHEETS REPORTS</div>

  <a class="button"
     target="_blank"
     href="https://docs.google.com/spreadsheets/d/e/YOUR_AEROFOTO_ID/pubhtml">
    ✈️ Aerofoto Sheet Report
  </a>

  <a class="button"
     target="_blank"
     href="https://docs.google.com/spreadsheets/d/e/YOUR_REFUEL_ID/pubhtml">
    ⛽ Refuelling Sheet Report
  </a>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCShhQ3KHWwbJMIB9STLvXiNTOa6UJZDn4",
  authDomain: "safe-sky-app.firebaseapp.com",
  projectId: "safe-sky-app"
});

const auth = firebase.auth();

const OWNER_UID = "L1CAgL8P55gz6oztjj5LIY4saYu2";

const lock = document.getElementById("lockScreen");
const content = document.getElementById("content");

/* 🔐 AUTH GUARD */
auth.onAuthStateChanged(user => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  if (user.uid !== OWNER_UID) {
    document.body.innerHTML = `
      <h2 style="color:white;text-align:center;margin-top:60px;">
        ⛔ Access Denied
      </h2>
    `;
    return;
  }

  lock.style.display = "none";
  content.classList.remove("hidden");

});

</script>

</body>
</html>
