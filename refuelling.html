<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refuelling Live Data</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background: #0f1c2e;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  font-size: 13px;
}

th, td {
  border: 1px solid #444;
  padding: 8px;
  text-align: center;
}

th {
  background: #1e2a45;
}

input, button {
  padding: 6px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>⛽ Refuelling Live Data</h1>

<div>
  <input type="text" id="vehicle-filter" placeholder="Vehicle">
  <input type="date" id="date-from">
  <input type="date" id="date-to">
  <button onclick="applyFilter()">Filter</button>
</div>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Employee</th>
      <th>Vehicle</th>
      <th>Fuel</th>
      <th>Qty (L)</th>
      <th>Cost (RSD)</th>
      <th>Odometer</th>
      <th>Notes</th>
      <th>Consumption</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRPLB_IA3YLNuvMFYRWKwam2hipyGN5XWWqmJYZyn1eS9aOEYbwjaER-3HuWxQn_qnKrNVg5z3p5_cT/pub?output=csv";

let sheetData = [];

/* CLEAN KEY */
function cleanKey(k) {
  return (k || "").trim().replace(/\uFEFF/g, "");
}

/* LOAD CSV */
Papa.parse(sheetURL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {

    sheetData = results.data.map(row => {
      const clean = {};
      Object.keys(row).forEach(k => {
        clean[cleanKey(k)] = row[k];
      });
      return clean;
    });

    render(sheetData);
  }
});

/* RENDER TABLE */
function render(data) {

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  let lastOdo = {};

  data.forEach(row => {

    const vehicle = row["Vehicle Registration Number (License Plate)"] || "";
    const odo = parseFloat(row["Odometer Reading (Kilometers)"]);
    const qty = parseFloat(row["Total Quantity (Liters)"]);

    let consumption = "-";

    if (lastOdo[vehicle] && odo && qty) {
      const dist = odo - lastOdo[vehicle];
      if (dist > 0) {
        consumption = ((qty / dist) * 100).toFixed(2);
      }
    }

    lastOdo[vehicle] = odo;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row["Date of Refuelling"] || ""}</td>
      <td>${row["Employee Full Name"] || ""}</td>
      <td>${vehicle}</td>
      <td>${row["Type of Fuel Purchased"] || ""}</td>
      <td>${qty || ""}</td>
      <td>${row["Total Cost of Refuelling (Currency: RSD)"] || ""}</td>
      <td>${odo || ""}</td>
      <td>${row["Additional Notes/Comments"] || ""}</td>
      <td>${consumption}</td>
    `;

    tbody.appendChild(tr);
  });
}

/* 🔥 FINAL SAFE FILTER (TIMESTAMP FIX) */
function applyFilter() {

  const vehicleInput = document.getElementById("vehicle-filter").value.toLowerCase().trim();

  const fromVal = document.getElementById("date-from").value;
  const toVal = document.getElementById("date-to").value;

  const from = fromVal ? new Date(fromVal).getTime() : null;
  const to = toVal ? new Date(toVal).getTime() : null;

  const filtered = sheetData.filter(row => {

    const vehicle = (row["Vehicle Registration Number (License Plate)"] || "").toLowerCase();

    const rawDate = row["Date of Refuelling"];
    if (!rawDate) return false;

    const parts = rawDate.split(".");
    if (parts.length !== 3) return false;

    const rowTime = new Date(
      parseInt(parts[2], 10),
      parseInt(parts[1], 10) - 1,
      parseInt(parts[0], 10)
    ).getTime();

    let ok = true;

    if (vehicleInput) {
      ok = ok && vehicle.includes(vehicleInput);
    }

    if (from !== null) {
      ok = ok && rowTime >= from;
    }

    if (to !== null) {
      ok = ok && rowTime <= to;
    }

    return ok;
  });

  render(filtered);
}

</script>

</body>
</html>
