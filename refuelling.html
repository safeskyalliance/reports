<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refuelling Live Data</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background: #0f1c2e;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  font-size: 13px;
}

th, td {
  border: 1px solid #444;
  padding: 8px;
  text-align: center;
}

th {
  background: #1e2a45;
}

input, button {
  padding: 6px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>⛽ Refuelling Live Data</h1>

<div>
  <label>Vehicle:
    <input type="text" id="vehicle-filter" placeholder="Reg. broj">
  </label>

  <label>From:
    <input type="date" id="date-from">
  </label>

  <label>To:
    <input type="date" id="date-to">
  </label>

  <button onclick="applyFilter()">Apply Filter</button>
</div>

<table id="data-table">
  <thead>
    <tr>
      <th>Date</th>
      <th>Vehicle</th>
      <th>Quantity (L)</th>
      <th>Cost</th>
      <th>Odometer</th>
      <th>Notes</th>
      <th>Consumption</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-REFUEL-YOUR-LINK/pub?output=csv";

let sheetData = [];

/* 🔥 FIX: parse dd.mm.yyyy */
function parseDMY(dateStr) {
  if (!dateStr) return null;

  const parts = dateStr.split(".");
  if (parts.length !== 3) return null;

  const day = parseInt(parts[0], 10);
  const month = parseInt(parts[1], 10) - 1;
  const year = parseInt(parts[2], 10);

  return new Date(year, month, day);
}

/* LOAD DATA */
Papa.parse(sheetURL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    sheetData = results.data.filter(r => r["Date of Refuelling"]);
    render(sheetData);
  }
});

/* RENDER */
function render(data) {

  const tbody = document.querySelector("#data-table tbody");
  tbody.innerHTML = "";

  data.forEach(row => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row["Date of Refuelling"] || ""}</td>
      <td>${row["Vehicle Registration Number (License Plate)"] || ""}</td>
      <td>${row["Total Quantity (Liters)"] || ""}</td>
      <td>${row["Total Cost of Refuelling (Currency: RSD)"] || ""}</td>
      <td>${row["Odometer Reading (Kilometers)"] || ""}</td>
      <td>${row["Additional Notes/Comments"] || ""}</td>
      <td>-</td>
    `;

    tbody.appendChild(tr);
  });
}

/* FILTER */
function applyFilter() {

  const vehicle = document.getElementById("vehicle-filter").value.toLowerCase();
  const from = document.getElementById("date-from").value;
  const to = document.getElementById("date-to").value;

  const filtered = sheetData.filter(row => {

    const rowDate = parseDMY(row["Date of Refuelling"]);
    if (!rowDate) return false;

    let ok = true;

    if (vehicle) {
      ok = row["Vehicle Registration Number (License Plate)"]
        ?.toLowerCase()
        .includes(vehicle);
    }

    if (from) {
      ok = ok && rowDate >= new Date(from);
    }

    if (to) {
      ok = ok && rowDate <= new Date(to);
    }

    return ok;
  });

  render(filtered);
}

</script>

</body>
</html>
