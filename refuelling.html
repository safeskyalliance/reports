<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refuelling Live</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background: #0f1c2e;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
  text-align: center;
}

h1 {
  margin-bottom: 25px;
}

/* FILTER BAR */
.filters {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  margin-bottom: 10px;
}

/* GROUP (label + input) */
.filter-group {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  min-width: 160px;
}

.label {
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 4px;
}

/* INPUT STYLE */
input {
  width: 160px;
  padding: 8px 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #1e2a45;
  color: white;
}

input::placeholder {
  color: #94a3b8;
}

/* BUTTON */
button {
  padding: 10px 14px;
  margin-top: 18px;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
  height: 40px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  font-size: 13px;
}

th, td {
  border: 1px solid #444;
  padding: 8px;
  text-align: center;
}

th {
  background: #1e2a45;
}
</style>
</head>

<body>

<div class="container">

<h1>⛽ Refuelling Live</h1>

<div class="filters">

  <div class="filter-group">
    <div class="label">Vehicle</div>
    <input type="text" id="vehicle-filter" placeholder="Enter vehicle">
  </div>

  <div class="filter-group">
    <div class="label">From date</div>
    <input type="date" id="date-from">
  </div>

  <div class="filter-group">
    <div class="label">To date</div>
    <input type="date" id="date-to">
  </div>

  <button onclick="applyFilter()">Filter</button>

</div>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Employee</th>
      <th>Vehicle</th>
      <th>Fuel</th>
      <th>Qty</th>
      <th>Cost</th>
      <th>Odometer</th>
      <th>Notes</th>
      <th>Consumption</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRPLB_IA3YLNuvMFYRWKwam2hipyGN5XWWqmJYZyn1eS9aOEYbwjaER-3HuWxQn_qnKrNVg5z3p5_cT/pub?output=csv";

let sheetData = [];

/* LOAD */
Papa.parse(sheetURL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    sheetData = results.data;
    render(sheetData);
  }
});

/* DATE FIX */
function toISO(dateStr) {
  if (!dateStr) return null;

  dateStr = dateStr.trim().replace(/\.$/, "");

  const p = dateStr.split(".");
  if (p.length < 3) return null;

  const day = p[0].padStart(2, "0");
  const month = p[1].padStart(2, "0");
  const year = p[2].slice(0, 4);

  return `${year}-${month}-${day}`;
}

/* RENDER */
function render(data) {

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  let lastOdo = {};

  data.forEach(row => {

    const vehicle = row["Vehicle Registration Number (License Plate)"] || "";
    const odo = parseFloat(row["Odometer Reading (Kilometers)"]);
    const qty = parseFloat(row["Total Quantity (Liters)"]);

    let consumption = "-";

    if (lastOdo[vehicle] && odo && qty) {
      const dist = odo - lastOdo[vehicle];
      if (dist > 0) {
        consumption = ((qty / dist) * 100).toFixed(2);
      }
    }

    lastOdo[vehicle] = odo;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row["Date of Refuelling"] || ""}</td>
      <td>${row["Employee Full Name"] || ""}</td>
      <td>${vehicle}</td>
      <td>${row["Type of Fuel Purchased"] || ""}</td>
      <td>${qty || ""}</td>
      <td>${row["Total Cost of Refuelling (Currency: RSD)"] || ""}</td>
      <td>${odo || ""}</td>
      <td>${row["Additional Notes/Comments"] || ""}</td>
      <td>${consumption}</td>
    `;

    tbody.appendChild(tr);
  });
}

/* FILTER */
function applyFilter() {

  const vehicleInput = document.getElementById("vehicle-filter").value.toLowerCase().trim();
  const from = document.getElementById("date-from").value;
  const to = document.getElementById("date-to").value;

  const filtered = sheetData.filter(row => {

    const vehicle = (row["Vehicle Registration Number (License Plate)"] || "").toLowerCase();

    const iso = toISO(row["Date of Refuelling"]);
    if (!iso) return false;

    let ok = true;

    if (vehicleInput) {
      ok = ok && vehicle.includes(vehicleInput);
    }

    if (from) {
      ok = ok && iso >= from;
    }

    if (to) {
      ok = ok && iso <= to;
    }

    return ok;
  });

  render(filtered);
}

</script>

</body>
</html>
