<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refuelling Live Data</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background: #0f1c2e;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
  text-align: center;
}

h1 { margin-bottom: 20px; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  font-size: 13px;
}

th, td {
  border: 1px solid #444;
  padding: 8px;
  text-align: center;
}

th {
  background: #1e2a45;
}

input, button {
  padding: 6px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>⛽ Refuelling Live Data</h1>

<div>
  <input type="text" id="vehicle-filter" placeholder="Vehicle">
  <input type="date" id="date-from">
  <input type="date" id="date-to">
  <button onclick="applyFilter()">Filter</button>
</div>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Employee</th>
      <th>Vehicle</th>
      <th>Fuel</th>
      <th>Qty (L)</th>
      <th>Cost (RSD)</th>
      <th>Odometer</th>
      <th>Notes</th>
      <th>Consumption</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-REFUEL-YOUR-LINK/pub?output=csv";

let sheetData = [];

/* CLEAN HEADER KEYS (FIX 90% BUGOVA) */
function cleanKey(key) {
  return key?.trim().replace(/\uFEFF/g, "");
}

/* DATE PARSER dd.mm.yyyy */
function parseDMY(str) {
  if (!str) return null;

  const parts = str.split(".");
  if (parts.length !== 3) return null;

  return new Date(
    parseInt(parts[2], 10),
    parseInt(parts[1], 10) - 1,
    parseInt(parts[0], 10)
  );
}

/* LOAD DATA */
Papa.parse(sheetURL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {

    // normalize keys
    sheetData = results.data.map(row => {
      const clean = {};
      Object.keys(row).forEach(k => {
        clean[cleanKey(k)] = row[k];
      });
      return clean;
    });

    console.log("LOADED DATA:", sheetData);

    render(sheetData);
  }
});

/* RENDER TABLE */
function render(data) {

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  if (!data || data.length === 0) {
    tbody.innerHTML = "<tr><td colspan='9'>No data</td></tr>";
    return;
  }

  let lastOdo = {};

  data.forEach(row => {

    const vehicle = row["Vehicle Registration Number (License Plate)"];
    const odo = parseFloat(row["Odometer Reading (Kilometers)"]);
    const qty = parseFloat(row["Total Quantity (Liters)"]);

    let consumption = "-";

    if (lastOdo[vehicle] && odo && qty) {
      const dist = odo - lastOdo[vehicle];
      if (dist > 0) {
        consumption = ((qty / dist) * 100).toFixed(2);
      }
    }

    lastOdo[vehicle] = odo;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row["Date of Refuelling"] || ""}</td>
      <td>${row["Employee Full Name"] || ""}</td>
      <td>${vehicle || ""}</td>
      <td>${row["Type of Fuel Purchased"] || ""}</td>
      <td>${qty || ""}</td>
      <td>${row["Total Cost of Refuelling (Currency: RSD)"] || ""}</td>
      <td>${odo || ""}</td>
      <td>${row["Additional Notes/Comments"] || ""}</td>
      <td>${consumption}</td>
    `;

    tbody.appendChild(tr);
  });
}

/* FILTER */
function applyFilter() {

  const vehicle = document.getElementById("vehicle-filter").value.toLowerCase();
  const from = document.getElementById("date-from").value;
  const to = document.getElementById("date-to").value;

  const filtered = sheetData.filter(row => {

    const rowDate = parseDMY(row["Date of Refuelling"]);
    if (!rowDate) return false;

    let ok = true;

    if (vehicle) {
      ok = row["Vehicle Registration Number (License Plate)"]
        ?.toLowerCase()
        .includes(vehicle);
    }

    if (from) ok = ok && rowDate >= new Date(from);
    if (to) ok = ok && rowDate <= new Date(to);

    return ok;
  });

  render(filtered);
}

</script>

</body>
</html>
